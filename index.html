<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BHYTE WASP Simulator</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
}

.container {
  text-align: center;
  padding: 10px;
}

#price {
  font-size: 120px;
  font-weight: bold;
}

.info {
  margin: 10px;
  font-size: 18px;
}

.controls button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 18px;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

.buy { background: #00ff88; }
.sell { background: #ff3b3b; }
.reset { background: #555; color: white; }

canvas {
  background: #0a0a0a;
  border: 1px solid #222;
  border-radius: 10px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>BHYTE WASP</h2>
  <div id="price">$50.00</div>

  <div class="info">💰 Balance: $<span id="balance">10000</span></div>
  <div class="info">📦 Posición: <span id="shares">0</span> acciones</div>
  <div class="info">📊 PnL: $<span id="pnl">0</span></div>
  <div class="info" id="event"></div>

  <div class="controls">
    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>
    <button class="reset" onclick="resetGame()">RESET</button>
  </div>

  <canvas id="chart"></canvas>
</div>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth * 0.95;
canvas.height = 400;

// Estado
let price = 50;
let balance = 10000;
let shares = 0;
let avgPrice = 0;

let candles = [];
let currentCandle;
let trend = 0;

function newCandle() {
  return { open: price, high: price, low: price, close: price };
}

currentCandle = newCandle();

// EVENTOS
function randomEvent() {
  let rand = Math.random();

  if (rand < 0.01) {
    price *= 1.3;
    showEvent("🚀 PUMP");
  } else if (rand < 0.02) {
    price *= 0.7;
    showEvent("💥 CRASH");
  } else if (rand < 0.03) {
    trend += (Math.random() - 0.5) * 5;
    showEvent("📰 NEWS");
  }
}

function showEvent(text) {
  const el = document.getElementById("event");
  el.textContent = text;
  setTimeout(() => el.textContent = "", 2000);
}

// UPDATE PRECIO
function update() {
  trend += (Math.random() - 0.5) * 0.2;
  let change = (Math.random() - 0.5) * 2 + trend;

  price += change;
  if (price < 1) price = 1;

  randomEvent();

  currentCandle.close = price;
  if (price > currentCandle.high) currentCandle.high = price;
  if (price < currentCandle.low) currentCandle.low = price;

  if (Math.random() < 0.05) {
    candles.push(currentCandle);
    if (candles.length > 60) candles.shift();
    currentCandle = newCandle();
  }

  draw();
  updateUI();
}

// UI
function updateUI() {
  const priceEl = document.getElementById("price");
  const balanceEl = document.getElementById("balance");
  const sharesEl = document.getElementById("shares");
  const pnlEl = document.getElementById("pnl");

  let color = currentCandle.close >= currentCandle.open ? "#00ff88" : "#ff3b3b";
  priceEl.style.color = color;
  priceEl.textContent = "$" + price.toFixed(2);

  balanceEl.textContent = balance.toFixed(2);
  sharesEl.textContent = shares;

  let pnl = shares * (price - avgPrice);
  pnlEl.textContent = pnl.toFixed(2);
  pnlEl.style.color = pnl >= 0 ? "#00ff88" : "#ff3b3b";
}

// TRADING
function buy() {
  if (balance >= price) {
    shares++;
    balance -= price;

    avgPrice = ((avgPrice * (shares - 1)) + price) / shares;
  }
}

function sell() {
  if (shares > 0) {
    shares--;
    balance += price;

    if (shares === 0) avgPrice = 0;
  }
}

function resetGame() {
  price = 50;
  balance = 10000;
  shares = 0;
  avgPrice = 0;
  candles = [];
  currentCandle = newCandle();
}

// GRÁFICA
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let all = [...candles, currentCandle];
  let max = Math.max(...all.map(c => c.high));
  let min = Math.min(...all.map(c => c.low));

  let w = canvas.width / 60;

  // grid
  ctx.strokeStyle = "#111";
  for (let i = 0; i < 10; i++) {
    let y = (i / 10) * canvas.height;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  all.forEach((c, i) => {
    let x = i * w;

    let open = scale(c.open, min, max);
    let close = scale(c.close, min, max);
    let high = scale(c.high, min, max);
    let low = scale(c.low, min, max);

    let color = c.close >= c.open ? "#00ff88" : "#ff3b3b";

    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(x + w/2, high);
    ctx.lineTo(x + w/2, low);
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.fillRect(x, Math.min(open, close), w*0.8, Math.abs(close - open) || 1);
  });
}

function scale(v, min, max) {
  return canvas.height - ((v - min) / (max - min || 1)) * canvas.height;
}

setInterval(update, 200);
</script>

</body>
</html>
