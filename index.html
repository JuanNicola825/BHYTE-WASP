<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BHYTE WASP Simulator</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

#price {
  font-size: 140px;
  font-weight: bold;
}

button {
  padding: 10px 20px;
  margin: 5px;
  font-size: 16px;
  cursor: pointer;
}

canvas {
  background: #0a0a0a;
  border: 1px solid #222;
  margin-top: 10px;
}

/* marca de agua */
.watermark {
  position: fixed;
  bottom: 10px;
  right: 15px;
  opacity: 0.2;
  font-size: 20px;
}
</style>
</head>

<body>

<h2>BHYTE WASP</h2>

<div>
  <button onclick="setAsset('gold')">ORO (GLD)</button>
  <button onclick="setAsset('oil')">PETRÓLEO (USO)</button>
</div>

<div id="price">$0.00</div>

<div>💰 Balance: $<span id="balance">10000</span></div>
<div>📦 Posición: <span id="shares">0</span></div>
<div>📊 PnL: $<span id="pnl">0</span></div>
<div id="event"></div>

<button onclick="buy()">BUY</button>
<button onclick="sell()">SELL</button>

<canvas id="chart"></canvas>

<div class="watermark">Nicola</div>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth * 0.95;
canvas.height = 400;

let asset = "gold";

// ESTADO
let price = 440;
let balance = 10000;
let shares = 0;
let avgPrice = 0;

let candles = [];
let currentCandle;

let volatility = 1;
let trend = 0;

function setAsset(type) {
  asset = type;

  if (type === "gold") {
    price = 440;
    volatility = 0.5;
    trend = 0.05;
  } else {
    price = 75;
    volatility = 2;
    trend = 0.2;
  }

  candles = [];
  currentCandle = newCandle();
}

function newCandle() {
  return { open: price, high: price, low: price, close: price };
}

currentCandle = newCandle();

function randomEvent() {
  let r = Math.random();

  if (asset === "gold") {
    if (r < 0.01) {
      price *= 1.05;
      showEvent("🏦 Safe Haven Pump");
    }
  } else {
    if (r < 0.02) {
      price *= 1.2;
      showEvent("🛢️ Oil Spike");
    } else if (r < 0.04) {
      price *= 0.8;
      showEvent("💥 Oil Crash");
    }
  }
}

function showEvent(text) {
  const el = document.getElementById("event");
  el.textContent = text;
  setTimeout(() => el.textContent = "", 2000);
}

function update() {
  trend += (Math.random() - 0.5) * 0.05;

  let change = (Math.random() - 0.5) * volatility + trend;
  price += change;

  if (price < 1) price = 1;

  randomEvent();

  currentCandle.close = price;
  if (price > currentCandle.high) currentCandle.high = price;
  if (price < currentCandle.low) currentCandle.low = price;

  if (Math.random() < 0.05) {
    candles.push(currentCandle);
    if (candles.length > 60) candles.shift();
    currentCandle = newCandle();
  }

  draw();
  updateUI();
}

function updateUI() {
  let color = currentCandle.close >= currentCandle.open ? "#00ff88" : "#ff3b3b";

  document.getElementById("price").style.color = color;
  document.getElementById("price").textContent = "$" + price.toFixed(2);

  document.getElementById("balance").textContent = balance.toFixed(2);
  document.getElementById("shares").textContent = shares;

  let pnl = shares * (price - avgPrice);
  let pnlEl = document.getElementById("pnl");
  pnlEl.textContent = pnl.toFixed(2);
  pnlEl.style.color = pnl >= 0 ? "#00ff88" : "#ff3b3b";
}

function buy() {
  if (balance >= price) {
    shares++;
    balance -= price;
    avgPrice = ((avgPrice * (shares - 1)) + price) / shares;
  }
}

function sell() {
  if (shares > 0) {
    shares--;
    balance += price;
    if (shares === 0) avgPrice = 0;
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let all = [...candles, currentCandle];
  let max = Math.max(...all.map(c => c.high));
  let min = Math.min(...all.map(c => c.low));

  let w = canvas.width / 60;

  all.forEach((c, i) => {
    let x = i * w;

    let open = scale(c.open, min, max);
    let close = scale(c.close, min, max);
    let high = scale(c.high, min, max);
    let low = scale(c.low, min, max);

    let color = c.close >= c.open ? "#00ff88" : "#ff3b3b";

    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(x + w/2, high);
    ctx.lineTo(x + w/2, low);
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.fillRect(x, Math.min(open, close), w*0.8, Math.abs(close - open) || 1);
  });
}function setAsset(type) {
  asset = type;

  if (type === "gold") {
    price = 442.35; // cierre simulado realista GLD
    volatility = 0.5;
    trend = 0.02;
    document.getElementById("event").textContent = "🟡 GLD - Último cierre";
  } else {
    price = 74.80; // cierre simulado USO
    volatility = 2;
    trend = 0.1;
    document.getElementById("event").textContent = "🛢️ USO - Último cierre";
  }

  candles = [];
  currentCandle = newCandle();
}

<div id="assetName">Activo: GLD</div>
function scale(v, min, max) {
  return canvas.height - ((v - min) / (max - min || 1)) * canvas.height;
}
document.getElementById("assetName").textContent =
  type === "gold" ? "Activo: GLD (Gold ETF)" : "Activo: USO (Oil ETF)";setInterval(update, 200);
</script>

</body>
</html>
