<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BHYTE WASP</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">
  <div class="header">BHYTE WASP</div>
  <div id="price">$0.00</div>
  <canvas id="chart"></canvas>
</div>

<script>
let price = 0.00;
let history = [price];

const priceElement = document.getElementById("price");
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

// ajustar canvas al tamaño de pantalla
canvas.width = window.innerWidth * 0.9;
canvas.height = 400;

function updatePrice() {
  // más volatilidad
  let change = (Math.random() - 0.5) * 2; 
  let newPrice = price + change;

  if (newPrice < 0) newPrice = 0;

  let color = newPrice >= price ? "#00ff88" : "#ff3b3b";

  price = newPrice;
  history.push(price);

  if (history.length > 120) history.shift();

  priceElement.textContent = "$" + price.toFixed(2);
  priceElement.style.color = color;

  drawChart(color);
}

function drawChart(color) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let max = Math.max(...history);
  let min = Math.min(...history);

  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;

  history.forEach((value, i) => {
    let x = (i / (history.length - 1)) * canvas.width;
    let y = canvas.height - ((value - min) / (max - min || 1)) * canvas.height;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.stroke();
}

// más fluido (cada 300ms)
setInterval(updatePrice, 300);
</script>

</body>
</html>
