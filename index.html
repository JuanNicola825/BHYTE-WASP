<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BHYTE WASP</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  color: white;
  font-family: Arial, sans-serif;
  height: 100%;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 10px;
}

.header {
  color: #888;
  font-size: 22px;
  letter-spacing: 2px;
}

#price {
  font-size: 140px; /* MÁS GRANDE */
  font-weight: bold;
  margin: 10px 0;
}

canvas {
  background: #0a0a0a;
  border: 1px solid #222;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">BHYTE WASP</div>
  <div id="price">$0.00</div>
  <canvas id="chart"></canvas>
</div>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");
const priceEl = document.getElementById("price");

canvas.width = window.innerWidth * 0.95;
canvas.height = 450;

// DATOS
let price = 50;
let candles = [];
let currentCandle = null;

// tendencia (hace que no sea tan random)
let trend = 0;

// crear vela inicial
function newCandle() {
  return {
    open: price,
    high: price,
    low: price,
    close: price
  };
}

currentCandle = newCandle();

function update() {
  // tendencia suave
  trend += (Math.random() - 0.5) * 0.2;

  // volatilidad + tendencia
  let change = (Math.random() - 0.5) * 2 + trend;
  price += change;

  if (price < 1) price = 1;

  // actualizar vela
  currentCandle.close = price;
  if (price > currentCandle.high) currentCandle.high = price;
  if (price < currentCandle.low) currentCandle.low = price;

  // cada cierto tiempo crear nueva vela
  if (Math.random() < 0.05) {
    candles.push(currentCandle);
    if (candles.length > 60) candles.shift();
    currentCandle = newCandle();
  }

  draw();
  updatePriceDisplay();
}

function updatePriceDisplay() {
  let last = currentCandle.close;
  let prev = currentCandle.open;

  let color = last >= prev ? "#00ff88" : "#ff3b3b";
  priceEl.style.color = color;
  priceEl.textContent = "$" + last.toFixed(2);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let all = [...candles, currentCandle];

  let max = Math.max(...all.map(c => c.high));
  let min = Math.min(...all.map(c => c.low));

  let candleWidth = canvas.width / 60;

  // GRID
  ctx.strokeStyle = "#111";
  for (let i = 0; i < 10; i++) {
    let y = (i / 10) * canvas.height;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  // DIBUJAR VELAS
  all.forEach((candle, i) => {
    let x = i * candleWidth;

    let openY = scale(candle.open, min, max);
    let closeY = scale(candle.close, min, max);
    let highY = scale(candle.high, min, max);
    let lowY = scale(candle.low, min, max);

    let color = candle.close >= candle.open ? "#00ff88" : "#ff3b3b";

    // mecha
    ctx.strokeStyle = color;
    ctx.beginPath();
    ctx.moveTo(x + candleWidth/2, highY);
    ctx.lineTo(x + candleWidth/2, lowY);
    ctx.stroke();

    // cuerpo
    ctx.fillStyle = color;
    let height = Math.abs(closeY - openY);
    ctx.fillRect(x, Math.min(openY, closeY), candleWidth * 0.8, height || 1);
  });

  // línea precio actual
  let currentY = scale(price, min, max);
  ctx.strokeStyle = "#ffffff22";
  ctx.beginPath();
  ctx.moveTo(0, currentY);
  ctx.lineTo(canvas.width, currentY);
  ctx.stroke();
}

function scale(value, min, max) {
  return canvas.height - ((value - min) / (max - min || 1)) * canvas.height;
}

// velocidad
setInterval(update, 200);
</script>

</body>
</html>
