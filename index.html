<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}

input, button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>BHYTE WASP</h1>

<input id="username" placeholder="Usuario"><br>
<input id="balance" placeholder="Monto inicial"><br>

<button onclick="start()">Entrar</button>

<script>
function start() {
  localStorage.setItem("user", document.getElementById("username").value);
  localStorage.setItem("balance", document.getElementById("balance").value);

  window.location.href = "stock.menu.html";
}
</script>

</body>
</html>
